<svg xmlns="http://www.w3.org/2000/svg" width="680" height="502" viewBox="0 0 680 502" role="img">
<title>上下游同步生命周期</title>
<desc>元仓 skill_root 持有骨架与 vendor 机制文件，下游 app code_root 持有 vendored 机制与项目自有的肉；sync-vendor 字节同步机制文件，update-upstream 手工搬运骨架变更，upstream-status 报告是否落后。</desc>
<style>
svg{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,sans-serif}
.t{font-size:14px;fill:#1c1c1a}.ts{font-size:12px;fill:#5f5e5a}.th{font-size:14px;font-weight:500;fill:#1c1c1a}
.arr{stroke:#888780;stroke-width:1.5;fill:none}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A}.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}.c-coral rect{fill:#FAECE7;stroke:#993C1D}.c-amber rect{fill:#FAEEDA;stroke:#854F0B}.c-blue rect{fill:#E6F1FB;stroke:#185FA5}.c-purple rect{fill:#EEEDFE;stroke:#534AB7}
.c-gray .t,.c-gray .ts,.c-gray .th{fill:#2C2C2A}.c-teal .t,.c-teal .ts,.c-teal .th{fill:#04342C}.c-coral .t,.c-coral .ts,.c-coral .th{fill:#4A1B0C}.c-amber .t,.c-amber .ts,.c-amber .th{fill:#412402}.c-blue .t,.c-blue .ts,.c-blue .th{fill:#042C53}.c-purple .t,.c-purple .ts,.c-purple .th{fill:#26215C}
</style>
<rect x="0" y="0" width="680" height="502" fill="#ffffff"/>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="40" y="44" width="600" height="116" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="th" x="56" y="62" text-anchor="start" dominant-baseline="central">元仓 skill_root（upstream · 唯一真源）</text>
<g class="c-teal"><rect x="56" y="80" width="250" height="68" rx="6" stroke-width="0.5"/><text class="th" x="181" y="98" text-anchor="middle" dominant-baseline="central">骨架（几乎不变）</text><text class="ts" x="181" y="118" text-anchor="middle" dominant-baseline="central">SKILL.md · routing.yaml</text><text class="ts" x="181" y="136" text-anchor="middle" dominant-baseline="central">rules · workflows · architecture</text></g>
<g class="c-blue"><rect x="322" y="80" width="150" height="68" rx="6" stroke-width="0.5"/><text class="th" x="397" y="98" text-anchor="middle" dominant-baseline="central">vendor 机制</text><text class="ts" x="397" y="118" text-anchor="middle" dominant-baseline="central">scripts/*</text><text class="ts" x="397" y="136" text-anchor="middle" dominant-baseline="central">sync-manifest</text></g>
<g class="c-gray"><rect x="482" y="80" width="142" height="68" rx="6" stroke-width="0.5"/><text class="th" x="553" y="98" text-anchor="middle" dominant-baseline="central">变更日志</text><text class="ts" x="553" y="118" text-anchor="middle" dominant-baseline="central">UPSTREAM-CHANGES</text><text class="ts" x="553" y="136" text-anchor="middle" dominant-baseline="central">每次变更登记</text></g>

<line x1="150" y1="160" x2="150" y2="222" class="arr" marker-end="url(#arrow)"/>
<line x1="150" y1="272" x2="150" y2="334" class="arr" marker-end="url(#arrow)"/>
<line x1="345" y1="160" x2="345" y2="222" class="arr" marker-end="url(#arrow)"/>
<line x1="345" y1="272" x2="345" y2="334" class="arr" marker-end="url(#arrow)"/>
<line x1="540" y1="334" x2="540" y2="274" class="arr" marker-end="url(#arrow)"/>
<line x1="540" y1="222" x2="540" y2="162" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="65" y="224" width="170" height="48" rx="8" stroke-width="0.5"/><text class="th" x="150" y="243" text-anchor="middle" dominant-baseline="central">sync-vendor.sh</text><text class="ts" x="150" y="261" text-anchor="middle" dominant-baseline="central">机制文件字节同步</text></g>
<g class="c-gray"><rect x="255" y="224" width="180" height="48" rx="8" stroke-width="0.5"/><text class="th" x="345" y="243" text-anchor="middle" dominant-baseline="central">update-upstream.md</text><text class="ts" x="345" y="261" text-anchor="middle" dominant-baseline="central">骨架变更手工搬运</text></g>
<g class="c-gray"><rect x="455" y="224" width="170" height="48" rx="8" stroke-width="0.5"/><text class="th" x="540" y="243" text-anchor="middle" dominant-baseline="central">upstream-status.sh</text><text class="ts" x="540" y="261" text-anchor="middle" dominant-baseline="central">是否落后 upstream</text></g>

<rect x="40" y="336" width="600" height="136" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="th" x="56" y="354" text-anchor="start" dominant-baseline="central">下游 app code_root（vendored 代码事实层）</text>
<g class="c-blue"><rect x="56" y="372" width="170" height="88" rx="6" stroke-width="0.5"/><text class="th" x="141" y="392" text-anchor="middle" dominant-baseline="central">vendored（只读）</text><text class="ts" x="141" y="412" text-anchor="middle" dominant-baseline="central">scripts/*</text><text class="ts" x="141" y="430" text-anchor="middle" dominant-baseline="central">字节一致 · 不可编辑</text></g>
<g class="c-coral"><rect x="246" y="372" width="180" height="88" rx="6" stroke-width="0.5"/><text class="th" x="336" y="392" text-anchor="middle" dominant-baseline="central">项目自有 肉</text><text class="ts" x="336" y="412" text-anchor="middle" dominant-baseline="central">conventions · gotchas</text><text class="ts" x="336" y="430" text-anchor="middle" dominant-baseline="central">references</text></g>
<g class="c-gray"><rect x="446" y="372" width="178" height="88" rx="6" stroke-width="0.5"/><text class="th" x="535" y="392" text-anchor="middle" dominant-baseline="central">app 入口 · 同步指针</text><text class="ts" x="535" y="412" text-anchor="middle" dominant-baseline="central">SKILL.md + routing</text><text class="ts" x="535" y="430" text-anchor="middle" dominant-baseline="central">.upstream-sync 指针</text></g>
</svg>
