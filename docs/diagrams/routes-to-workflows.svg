<svg xmlns="http://www.w3.org/2000/svg" width="680" height="540" viewBox="0 0 680 540" role="img">
<title>路由展开：两个 Skill 的 route 到 workflow</title>
<desc>命中 Skill 后展开为各自的多条 route，前端与后端各有独立路由表，每条 route 映射到对应 workflow，标注 route 与 workflow 不同名的例外。</desc>
<style>
svg{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,sans-serif}
.t{font-size:14px;fill:#1c1c1a}
.ts{font-size:12px;fill:#5f5e5a}
.th{font-size:14px;font-weight:500;fill:#1c1c1a}
.arr{stroke:#888780;stroke-width:1.5;fill:none}
.leader{stroke:#b4b2a9;stroke-width:1;stroke-dasharray:4 3;fill:none}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}
.c-coral rect{fill:#FAECE7;stroke:#993C1D}
.c-amber rect{fill:#FAEEDA;stroke:#854F0B}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7}
.c-gray .t,.c-gray .ts,.c-gray .th{fill:#2C2C2A}
.c-teal .t,.c-teal .ts,.c-teal .th{fill:#04342C}
.c-coral .t,.c-coral .ts,.c-coral .th{fill:#4A1B0C}
.c-amber .t,.c-amber .ts,.c-amber .th{fill:#412402}
.c-blue .t,.c-blue .ts,.c-blue .th{fill:#042C53}
.c-purple .t,.c-purple .ts,.c-purple .th{fill:#26215C}
</style>
<rect x="0" y="0" width="680" height="540" fill="#ffffff"/>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-amber"><rect x="160" y="44" width="360" height="48" rx="8" stroke-width="0.5"/><text class="th" x="340" y="68" text-anchor="middle" dominant-baseline="central">扫 SKILL.md → 命中哪个 Skill？</text></g>
<path d="M340 92 L340 106" class="arr" fill="none"/>
<path d="M181 106 L495 106" class="arr" fill="none"/>
<line x1="181" y1="106" x2="181" y2="138" class="arr" marker-end="url(#arrow)"/>
<line x1="495" y1="106" x2="495" y2="138" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="122" text-anchor="middle" dominant-baseline="central">双端任务 = 两个 Skill 各走一次</text>

<rect x="36" y="140" width="290" height="360" rx="12" fill="none" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="th" x="52" y="162" text-anchor="start" dominant-baseline="central">前端项目 Skill · 9 条路由</text>
<text class="t" x="52" y="197" text-anchor="start" dominant-baseline="central">• plan-feature</text>
<text class="t" x="52" y="227" text-anchor="start" dominant-baseline="central">• fix-bug</text>
<text class="t" x="52" y="257" text-anchor="start" dominant-baseline="central">• add-page-or-module</text>
<text class="t" x="52" y="287" text-anchor="start" dominant-baseline="central">• add-amis-page</text>
<text class="t" x="52" y="317" text-anchor="start" dominant-baseline="central">• add-hybrid-renderer</text>
<text class="t" x="52" y="347" text-anchor="start" dominant-baseline="central">• fix-schema-error</text>
<text class="t" x="52" y="377" text-anchor="start" dominant-baseline="central">• skill-maintenance <tspan class="ts">→ update-rules.md</tspan></text>
<text class="t" x="52" y="407" text-anchor="start" dominant-baseline="central">• update-upstream</text>
<text class="t" x="52" y="437" text-anchor="start" dominant-baseline="central">• other <tspan class="ts">→ 最近 workflow</tspan></text>
<text class="ts" x="52" y="478" text-anchor="start" dominant-baseline="central">同名 route → workflows/&lt;id&gt;.md</text>

<rect x="350" y="140" width="290" height="360" rx="12" fill="none" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="th" x="366" y="162" text-anchor="start" dominant-baseline="central">后端项目 Skill · 10 条路由</text>
<text class="t" x="366" y="197" text-anchor="start" dominant-baseline="central">• plan-feature</text>
<text class="t" x="366" y="227" text-anchor="start" dominant-baseline="central">• implement-feature</text>
<text class="t" x="366" y="257" text-anchor="start" dominant-baseline="central">• fix-bug</text>
<text class="t" x="366" y="287" text-anchor="start" dominant-baseline="central">• rpc-contract <tspan class="ts">→ implement-feature.md</tspan></text>
<text class="t" x="366" y="317" text-anchor="start" dominant-baseline="central">• do-bo-modeling <tspan class="ts">→ 切到 do-bo skill</tspan></text>
<text class="t" x="366" y="347" text-anchor="start" dominant-baseline="central">• refactor <tspan class="ts">→ refactor-fanout.md</tspan></text>
<text class="t" x="366" y="377" text-anchor="start" dominant-baseline="central">• update-rules</text>
<text class="t" x="366" y="407" text-anchor="start" dominant-baseline="central">• maintain-docs</text>
<text class="t" x="366" y="437" text-anchor="start" dominant-baseline="central">• update-upstream</text>
<text class="t" x="366" y="467" text-anchor="start" dominant-baseline="central">• other <tspan class="ts">→ change-managed.md</tspan></text>
</svg>
