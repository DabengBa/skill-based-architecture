<svg xmlns="http://www.w3.org/2000/svg" width="680" height="800" viewBox="0 0 680 800" role="img">
<title>Routing 核心思维</title>
<desc>routing 的核心：description 粗活化 → routing.yaml 唯一真源（生成薄壳/Common Tasks/Always Read）→ 匹配 route → route 六要素 → required_reads 分层（骨架/肉）→ workflow → 可达性与自维护脊柱回灌真源。</desc>
<style>
svg{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,sans-serif}
.t{font-size:14px;fill:#1c1c1a}
.ts{font-size:12px;fill:#5f5e5a}
.th{font-size:14px;font-weight:500;fill:#1c1c1a}
.arr{stroke:#888780;stroke-width:1.5;fill:none}
.leader{stroke:#b4b2a9;stroke-width:1;stroke-dasharray:4 3;fill:none}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}
.c-coral rect{fill:#FAECE7;stroke:#993C1D}
.c-amber rect{fill:#FAEEDA;stroke:#854F0B}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7}
.c-gray .t,.c-gray .ts,.c-gray .th{fill:#2C2C2A}
.c-teal .t,.c-teal .ts,.c-teal .th{fill:#04342C}
.c-coral .t,.c-coral .ts,.c-coral .th{fill:#4A1B0C}
.c-amber .t,.c-amber .ts,.c-amber .th{fill:#412402}
.c-blue .t,.c-blue .ts,.c-blue .th{fill:#042C53}
.c-purple .t,.c-purple .ts,.c-purple .th{fill:#26215C}
</style>
<rect x="0" y="0" width="680" height="800" fill="#ffffff"/>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-purple"><rect x="100" y="48" width="300" height="68" rx="8" stroke-width="0.5"/><text class="th" x="250" y="70" text-anchor="middle" dominant-baseline="central">① description · 粗活化</text><text class="ts" x="250" y="90" text-anchor="middle" dominant-baseline="central">域边界 + 真实触发语</text><text class="ts" x="250" y="107" text-anchor="middle" dominant-baseline="central">不写 workflow 步骤（否则变捷径）</text></g>
<line x1="400" y1="82" x2="430" y2="82" class="leader"/>
<g class="c-gray"><rect x="430" y="62" width="210" height="40" rx="8" stroke-width="0.5"/><text class="th" x="535" y="82" text-anchor="middle" dominant-baseline="central">决定 skill 该不该醒</text></g>
<line x1="250" y1="116" x2="250" y2="138" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="262" y="128" text-anchor="start" dominant-baseline="central">醒来 → 交给 routing 分派</text>

<g class="c-purple"><rect x="100" y="140" width="300" height="58" rx="8" stroke-width="1.3"/><text class="th" x="250" y="162" text-anchor="middle" dominant-baseline="central">② routing.yaml · 唯一真源</text><text class="ts" x="250" y="182" text-anchor="middle" dominant-baseline="central">路由都在此；薄壳 / SKILL 只说怎么读</text></g>
<text class="ts" x="430" y="126" text-anchor="start" dominant-baseline="central">sync-routing.sh 由此生成：</text>
<line x1="400" y1="160" x2="428" y2="150" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="430" y="136" width="210" height="30" rx="6" stroke-width="0.5"/><text class="ts" x="444" y="151" text-anchor="start" dominant-baseline="central">薄壳 bootstrap（AGENTS/…）</text></g>
<g class="c-gray"><rect x="430" y="172" width="210" height="30" rx="6" stroke-width="0.5"/><text class="ts" x="444" y="187" text-anchor="start" dominant-baseline="central">SKILL.md · Common Tasks</text></g>
<g class="c-gray"><rect x="430" y="208" width="210" height="30" rx="6" stroke-width="0.5"/><text class="ts" x="444" y="223" text-anchor="start" dominant-baseline="central">Always Read 列表</text></g>
<line x1="250" y1="198" x2="250" y2="220" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple"><rect x="100" y="224" width="300" height="68" rx="8" stroke-width="0.5"/><text class="th" x="250" y="244" text-anchor="middle" dominant-baseline="central">③ 匹配 route（粗 → 细）</text><text class="ts" x="250" y="264" text-anchor="middle" dominant-baseline="central">labels · trigger_examples · intent</text><text class="ts" x="250" y="282" text-anchor="middle" dominant-baseline="central">other 强制兜底（任何任务都有落点）</text></g>
<line x1="250" y1="292" x2="250" y2="304" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple"><rect x="60" y="308" width="380" height="84" rx="8" stroke-width="0.5"/><text class="th" x="250" y="330" text-anchor="middle" dominant-baseline="central">④ 一条 route = 意图 → 落点 绑定</text><text class="ts" x="250" y="356" text-anchor="middle" dominant-baseline="central">id · labels(中/英) · trigger_examples(自然语言)</text><text class="ts" x="250" y="378" text-anchor="middle" dominant-baseline="central">route(一句话策略) · required_reads · workflow</text></g>
<line x1="250" y1="392" x2="250" y2="418" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple"><rect x="60" y="422" width="380" height="32" rx="8" stroke-width="0.5"/><text class="th" x="250" y="438" text-anchor="middle" dominant-baseline="central">⑤ required_reads · 外科式 + 分层 · token 收口</text></g>
<line x1="250" y1="454" x2="250" y2="460" class="arr" fill="none"/>
<path d="M152 460 L347 460" class="arr" fill="none"/>
<line x1="152" y1="460" x2="152" y2="464" class="arr" marker-end="url(#arrow)"/>
<line x1="347" y1="460" x2="347" y2="464" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="60" y="466" width="185" height="76" rx="8" stroke-width="0.5"/><text class="th" x="152" y="486" text-anchor="middle" dominant-baseline="central">skill: 骨架（稳定）</text><text class="ts" x="152" y="508" text-anchor="middle" dominant-baseline="central">architecture</text><text class="ts" x="152" y="526" text-anchor="middle" dominant-baseline="central">rules · workflows</text></g>
<g class="c-coral"><rect x="255" y="466" width="185" height="76" rx="8" stroke-width="0.5"/><text class="th" x="347" y="486" text-anchor="middle" dominant-baseline="central">code: 肉（随代码漂）</text><text class="ts" x="347" y="508" text-anchor="middle" dominant-baseline="central">conventions · gotchas</text><text class="ts" x="347" y="526" text-anchor="middle" dominant-baseline="central">references</text></g>
<path d="M152 542 L152 552 L250 552" class="arr" fill="none"/>
<path d="M347 542 L347 552 L250 552" class="arr" fill="none"/>
<line x1="250" y1="552" x2="250" y2="568" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple"><rect x="100" y="570" width="300" height="56" rx="8" stroke-width="0.5"/><text class="th" x="250" y="590" text-anchor="middle" dominant-baseline="central">⑥ workflow · 可复用 / 可跳转</text><text class="ts" x="250" y="610" text-anchor="middle" dominant-baseline="central">多 route 共用 · 可跳别的 skill</text></g>
<line x1="250" y1="626" x2="250" y2="650" class="arr" marker-end="url(#arrow)"/>

<rect x="60" y="654" width="520" height="112" rx="12" fill="none" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="th" x="76" y="676" text-anchor="start" dominant-baseline="central">⑦ routing = 激活 / 可达性脊柱（激活 not 存储）</text>
<g class="c-blue"><rect x="76" y="694" width="176" height="52" rx="8" stroke-width="0.5"/><text class="th" x="164" y="712" text-anchor="middle" dominant-baseline="central">route-reachability</text><text class="ts" x="164" y="730" text-anchor="middle" dominant-baseline="central">活跃文件可从 route 到达</text></g>
<g class="c-blue"><rect x="262" y="694" width="120" height="52" rx="8" stroke-width="0.5"/><text class="th" x="322" y="712" text-anchor="middle" dominant-baseline="central">audit-orphans</text><text class="ts" x="322" y="730" text-anchor="middle" dominant-baseline="central">无孤儿文件</text></g>
<g class="c-blue"><rect x="392" y="694" width="176" height="52" rx="8" stroke-width="0.5"/><text class="th" x="480" y="712" text-anchor="middle" dominant-baseline="central">sync-routing</text><text class="ts" x="480" y="730" text-anchor="middle" dominant-baseline="central">回灌真源的投影</text></g>

<path d="M60 710 L44 710 L44 169 L100 169" class="arr" fill="none" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<text class="ts" x="50" y="405" text-anchor="start" dominant-baseline="central">自维护回环</text>
</svg>
