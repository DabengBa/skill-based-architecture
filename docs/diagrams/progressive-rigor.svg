<svg xmlns="http://www.w3.org/2000/svg" width="680" height="330" viewBox="0 0 680 330" role="img">
<title>Progressive Rigor 三档生长</title>
<desc>技能结构在压力下从 Single-file 升到 Folder-light 再到 Full，升档由具体触发条件驱动，内容缩水时降档。</desc>
<style>
svg{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,sans-serif}
.t{font-size:14px;fill:#1c1c1a}.ts{font-size:12px;fill:#5f5e5a}.th{font-size:14px;font-weight:500;fill:#1c1c1a}
.arr{stroke:#888780;stroke-width:1.5;fill:none}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A}.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}.c-coral rect{fill:#FAECE7;stroke:#993C1D}.c-amber rect{fill:#FAEEDA;stroke:#854F0B}.c-blue rect{fill:#E6F1FB;stroke:#185FA5}.c-purple rect{fill:#EEEDFE;stroke:#534AB7}
.c-gray .t,.c-gray .ts,.c-gray .th{fill:#2C2C2A}.c-teal .t,.c-teal .ts,.c-teal .th{fill:#04342C}.c-coral .t,.c-coral .ts,.c-coral .th{fill:#4A1B0C}.c-amber .t,.c-amber .ts,.c-amber .th{fill:#412402}.c-blue .t,.c-blue .ts,.c-blue .th{fill:#042C53}.c-purple .t,.c-purple .ts,.c-purple .th{fill:#26215C}
</style>
<rect x="0" y="0" width="680" height="330" fill="#ffffff"/>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="40" y="44" width="600" height="80" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="th" x="56" y="66" text-anchor="start" dominant-baseline="central">升档触发（grow only under pressure）</text>
<text class="ts" x="56" y="88" text-anchor="start" dominant-baseline="central">SKILL.md body &gt; 90 行 · description &gt; 25 行 · 同一坑出现两次</text>
<text class="ts" x="56" y="108" text-anchor="start" dominant-baseline="central">任务需要分步指令 · 两个 harness 共享路由 · 理论与代码纠缠 → 按 骨架/肉 拆分</text>

<g class="c-gray"><rect x="40" y="150" width="180" height="84" rx="8" stroke-width="0.5"/><text class="th" x="130" y="172" text-anchor="middle" dominant-baseline="central">① Single-file</text><text class="ts" x="130" y="194" text-anchor="middle" dominant-baseline="central">SKILL.md only</text><text class="ts" x="130" y="212" text-anchor="middle" dominant-baseline="central">&lt; 3 主题</text></g>
<g class="c-teal"><rect x="250" y="150" width="180" height="84" rx="8" stroke-width="0.5"/><text class="th" x="340" y="172" text-anchor="middle" dominant-baseline="central">② Folder-light</text><text class="ts" x="340" y="194" text-anchor="middle" dominant-baseline="central">+ rules/</text><text class="ts" x="340" y="212" text-anchor="middle" dominant-baseline="central">3–5 主题 / 1 复用流程</text></g>
<g class="c-teal"><rect x="460" y="150" width="180" height="84" rx="8" stroke-width="0.5"/><text class="th" x="550" y="172" text-anchor="middle" dominant-baseline="central">③ Full</text><text class="ts" x="550" y="194" text-anchor="middle" dominant-baseline="central">+ workflows + references</text><text class="ts" x="550" y="212" text-anchor="middle" dominant-baseline="central">+ 薄壳 thin shells</text></g>

<line x1="220" y1="192" x2="250" y2="192" class="arr" marker-end="url(#arrow)"/>
<line x1="430" y1="192" x2="460" y2="192" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="235" y="140" text-anchor="middle" dominant-baseline="central">升档</text>
<text class="ts" x="445" y="140" text-anchor="middle" dominant-baseline="central">升档</text>

<path d="M550 234 C550 296 130 296 130 234" class="arr" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="290" text-anchor="middle" dominant-baseline="central">内容缩水 → 降档</text>
</svg>
